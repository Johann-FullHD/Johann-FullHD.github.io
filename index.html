<!doctype html>
<html lang="de" class="unselectable">
  <head>
    <title>Johann Kramer | Site Maintenance</title>
    <meta charset="utf-8"/>
    <meta name="robots" content="noindex"/>
    <meta name="description" content="Landing page Johann Kramer">
    <meta name="keywords" content="Johann Kramer, CSS, HTML, PHP, JS, SirJFK, johann_fullhd">
    <meta name="author" content="Johann Kramer">
    <meta name="copyright" content="Copyright 2024">
    <link rel="shortcut icon" type="image/x-icon" href="Logo_icon.ico">
    <style>
      /* Add overflow hidden to prevent scrolling */
      html, body {
        overflow: hidden;
        height: 100%;
        margin: 0;
      }
      body {
        text-align: center;
        font: 20px Helvetica, sans-serif;
        color: #efe8e8;
        /* Make background image cover the entire page */
        background: url(Background_Index.png) center center no-repeat;
        background-size: cover;
      }
      @media (min-width: 768px){
        body{ padding-top: 150px; }
      }
      h1 { font-size: 50px; }
      article {
        display: block;
        text-align: left;
        max-width: 650px;
        margin: 0 auto;
        padding: 20px;
        position: relative;
        backdrop-filter: blur(5px);
        background-color: rgba(255, 255, 255, 0.1);
        border-radius: 10px;
        transform: translateY(200px);
      }
      a {
        color: #dc8100;
        text-decoration: none;
      }
      a:hover {
        color: #efe8e8;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <article>
      <h1>I&rsquo;ll be back soon!</h1>
      <div>
        <p>Sorry for the inconvenience but we&rsquo;re performing some maintenance at the moment. If you need to you can always <a href="mailto:kjohann1908@gmail.com">contact me</a>, otherwise we&rsquo;ll be back online shortly!</p>
        <p>&mdash; Johann Kramer</p>
      </div>
      <div style="display: flex; flex-direction: row; justify-content: space-between;">
        <p class="day"></p>
        <p class="hour"></p>
        <p class="minute"></p>
        <p class="second"></p>
      </div>
    </article>
    <script>
      const countDown = () => {
        const countDay = new Date('June 2, 2024 00:00:00');
        const now = new Date();
        const counter = countDay - now;
        const second = 1000;
        const minute = second * 60;
        const hour = minute * 60;
        const day = hour * 24;
        const textDay = Math.floor(counter / day);
        const textHour = Math.floor((counter % day) / hour);
        const textMinute = Math.floor((counter % hour) / minute);
        const textSecond = Math.floor((counter % minute) / second)
        document.querySelector(".day").innerText = textDay + ' Days';
        document.querySelector(".hour").innerText = textHour + ' Hours';
        document.querySelector(".minute").innerText = textMinute + ' Minutes';
        document.querySelector(".second").innerText = textSecond + ' Seconds';
      }
      setInterval(countDown, 1000);
    </script>
  </body>
</html>
