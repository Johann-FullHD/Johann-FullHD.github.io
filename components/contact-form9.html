  <body>
    <link rel="stylesheet" href="../style.css" />
    <div>
      <link href="./contact-form9.css" rel="stylesheet" />
      <div class="contact-form9-contact11 thq-section-padding">
        <div class="contact-form9-max-width thq-section-max-width">
          <div class="contact-form9-section-title thq-card">
            <span class="thq-body-small">
              <span>
                Bei Fragen oder Rückmeldungen können Sie sich gerne an mich
                wenden.
              </span>
            </span>
            <div class="contact-form9-content">
              <h2 class="thq-heading-2"><span>Contact Me</span></h2>
              <p class="thq-body-large">
                <span>
                  Ich bin hier, um Ihnen zu helfen. Bitte füllen Sie das
                  untenstehende Formular aus oder kontaktieren Sie mich direkt.
                </span>
              </p>
            </div>
          </div>
          <div class="contact-form9-content1">
            <form class="contact-form9-form thq-card">
              <div class="contact-form9-input">
                <label for="contact-form-9-name" class="thq-body-small">
                  Name
                </label>
                <input
                  type="text"
                  id="contact-form-9-name"
                  placeholder="Full Name"
                  class="thq-input"
                />
              </div>
              <div class="contact-form9-input1">
                <label for="contact-form-9-email" class="thq-body-small">
                  Email
                </label>
                <input
                  type="text"
                  id="contact-form-9-email"
                  required="true"
                  placeholder="Email"
                  class="thq-input"
                />
              </div>
              <div class="contact-form9-container">
                <div class="contact-form9-input2">
                  <label for="contact-form-9-options" class="thq-body-small">
                    Choose one topic
                  </label>
                  <select
                    id="contact-form-9-options"
                    placeholder="Select one"
                    class="thq-select"
                  >
                    <option value="Option 1">Option 1</option>
                    <option value="Option 1">Customer Service</option>
                    <option value="Option 1">Feature request</option>
                    <option value="Option 2">Option 2</option>
                    <option value="Option 3">Option 3</option>
                  </select>
                </div>
              </div>
              <div class="contact-form9-input3">
                <label for="contact-form-9-message" class="thq-body-small">
                  Message
                </label>
                <textarea
                  id="contact-form-9-message"
                  rows="3"
                  placeholder="Enter your message"
                  class="thq-input"
                ></textarea>
              </div>
              <div class="contact-form9-checkbox">
                <input
                  type="checkbox"
                  id="contact-form-9-check"
                  checked="true"
                  required="true"
                  class="thq-checkbox"
                />
                <label for="contact-form-9-check" class="thq-body-small">
                  <span>I accept the</span>
                  <a href="index.html" class="contact-form9-navlink">
                    Terms of Service
                  </a>
                  <br />
                </label>
              </div>
              <a
                href="mailto:kjohann1908@gmail.com?subject=Website | Auto Contact Form"
                class="contact-form9-button thq-button-filled"
              >
                <span class="thq-body-small"><span>Submit</span></span>
              </a>
            </form>
            <div class="contact-form9-content2 thq-card">
              <div class="contact-form9-row thq-flex-row">
                <div class="contact-form9-content3">
                  <svg
                    viewBox="0 0 1024 1024"
                    class="contact-form9-icon thq-icon-small"
                  >
                    <path
                      d="M854 342v-86l-342 214-342-214v86l342 212zM854 170q34 0 59 26t25 60v512q0 34-25 60t-59 26h-684q-34 0-59-26t-25-60v-512q0-34 25-60t59-26h684z"
                    ></path>
                  </svg>
                  <div class="contact-form9-contact-info">
                    <h3 class="thq-heading-3">Email - privat</h3>
                    <a
                      href="mailto:johannk1908@hotmail.com?subject=Website | [Ihr Anliegen]"
                      class="contact-form9-email thq-body-small"
                    >
                      <span>johannk1908@hotmail.com</span>
                    </a>
                  </div>
                </div>
                <div class="contact-form9-content4">
                  <svg
                    viewBox="0 0 1024 1024"
                    class="contact-form9-icon2 thq-icon-small"
                  >
                    <path
                      d="M854 342v-86l-342 214-342-214v86l342 212zM854 170q34 0 59 26t25 60v512q0 34-25 60t-59 26h-684q-34 0-59-26t-25-60v-512q0-34 25-60t59-26h684z"
                    ></path>
                  </svg>
                  <div class="contact-form9-contact-info1">
                    <h3 class="thq-heading-3">Email - geschäftlich</h3>
                    <a
                      href="mailto:kjohann1908@gmail.com?subject=Website | [Ihr Anliegen]"
                      class="contact-form9-phone thq-body-small"
                    >
                      <span>kjohann1908@gmail.com</span>
                    </a>
                  </div>
                </div>
              </div>
              <div class="thq-flex-row contact-form9-row1">
                <img
                  alt="Contact Image"
                  src="https://images.unsplash.com/photo-1519389950473-47ba0277781c?crop=entropy&amp;cs=tinysrgb&amp;fit=max&amp;fm=jpg&amp;ixid=M3w5MTMyMXwwfDF8cmFuZG9tfHx8fHx8fHx8MTcxNTQ0NzQ5NXw&amp;ixlib=rb-4.0.3&amp;q=80&amp;w=1400"
                  class="contact-form9-image thq-img-ratio-1-1"
                />
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script
      defer=""
      src="https://unpkg.com/@teleporthq/teleport-custom-scripts"
    ></script>
